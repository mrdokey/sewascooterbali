<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi.Balitour - Booking System</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3721/3721619.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: #343a40; color: white; padding: 60px 0; text-align: center; margin-bottom: 30px; }
        .card-motor { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; overflow: hidden; }
        .card-motor:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); border-color: #007bff; }
        .search-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: -80px; }
        .btn-primary { background-color: #007bff; border: none; padding: 12px; }
        .btn-success { padding: 10px; border-radius: 8px; }
        .placeholder-text { color: #adb5bd; margin-top: 50px; font-weight: 300; }
        .available-badge { font-size: 1rem; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="hero">
    <div class="container">
        <h1 class="display-4 fw-bold">Budi.Balitour</h1>
        <p class="lead">Select your rental dates to see available models</p>
    </div>
</div>

<div class="container">
    <div class="search-box mb-5">
        <div class="row g-3">
            <div class="col-md-5">
                <label class="form-label fw-bold text-secondary">Pick-up Date</label>
                <input type="date" id="start" class="form-control form-control-lg">
            </div>
            <div class="col-md-5">
                <label class="form-label fw-bold text-secondary">Return Date</label>
                <input type="date" id="end" class="form-control form-control-lg">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="handleFilter()" class="btn btn-primary w-100 fw-bold btn-lg">Search</button>
            </div>
        </div>
    </div>

    <div id="loading" class="text-center py-5" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Checking fleet availability...</p>
    </div>

    <div id="placeholder" class="text-center py-5">
        <h2 class="placeholder-text">Please select dates to check availability.</h2>
    </div>

    <div class="row" id="motorContainer"></div>
</div>

<div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Confirm Selection</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4" id="modalBody">
        </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="confirmWaBtn" class="btn btn-success px-4 fw-bold">Continue to WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // KONFIGURASI
    const API_URL = "https://script.google.com/macros/s/AKfycbyvXVcpkMsnPKEqORXpQYMrNJ4spjzwACGP2abuDJEmSdz2_pNnxfa4lW2Afh_1fiqshw/exec";
    const adminNumber = "6281238033247"; 

    let motors = [];
    let bookings = [];
    let isDataLoaded = false;

    // 1. Ambil data saat halaman dibuka
    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            motors = data.items;
            bookings = data.bookings;
            isDataLoaded = true;
            console.log("Data fetched successfully");
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // 2. Fungsi Logika Filter Bentrok
    function isOccupied(plate, startReq, endReq) {
        const sReq = new Date(startReq);
        const eReq = new Date(endReq);
        
        return bookings.some(b => {
            if (b.no_motor !== plate) return false;
            return (sReq < new Date(b.end) && eReq > new Date(b.start));
        });
    }

    // 3. Fungsi Render HTML (Dengan Logika Grouping)
    function renderList(sDate, eDate) {
        const container = document.getElementById('motorContainer');
        container.innerHTML = "";
        
        let availableGroups = {};
        let totalAvailable = 0;

        // Grouping Data
        motors.forEach(m => {
            const plate = m[0];
            const type = m[1];
            const brand = m[2];
            const price = m[3];
            const status = m[5];

            // Filter bengkel & bentrok
            if (status === "Bengkel") return;
            if (isOccupied(plate, sDate, eDate)) return;

            totalAvailable++;

            // Buat kunci unik berdasarkan Brand & Tipe
            const groupKey = `${brand}_${type}`;

            if (!availableGroups[groupKey]) {
                availableGroups[groupKey] = {
                    brand: brand,
                    type: type,
                    price: price,
                    count: 0,
                    samplePlate: plate // Simpan 1 pelat untuk referensi admin
                };
            }
            availableGroups[groupKey].count++;
        });

        if (totalAvailable === 0) {
            container.innerHTML = `<div class="text-center py-5 w-100"><h3>😔 Sorry, we are fully booked for these dates.</h3></div>`;
            return;
        }

        // Render Card Hasil Grouping
        for (const key in availableGroups) {
            const group = availableGroups[key];
            
            container.innerHTML += `
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card card-motor h-100 p-4 text-center border-top border-4 border-primary">
                        <div class="card-body d-flex flex-column justify-content-between p-0">
                            <div>
                                <span class="badge bg-primary text-white py-2 px-3 mb-3 available-badge rounded-pill">
                                    ${group.count} Unit(s) Available
                                </span>
                                <h4 class="fw-bold text-dark mb-0 text-uppercase">${group.brand}</h4>
                                <h5 class="text-secondary mb-4">${group.type}</h5>
                                
                                <div class="bg-light p-3 rounded mb-4">
                                    <span class="d-block text-muted" style="font-size:0.85rem">Daily Rate</span>
                                    <span class="fw-bold fs-4 text-dark">IDR ${Number(group.price).toLocaleString('id-ID')}</span>
                                </div>
                            </div>
                            <button onclick="openBooking('${group.brand}', '${group.type}', '${group.price}', '${group.samplePlate}')" class="btn btn-success fw-bold w-100 py-3">Book Now</button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    // 4. Handler Tombol Cek
    async function handleFilter() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;

        if (!start || !end) {
            alert("Please select both Pick-up and Return dates.");
            return;
        }

        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('motorContainer').innerHTML = "";
        document.getElementById('loading').style.display = 'block';

        if (!isDataLoaded) {
            await fetchData();
        }

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            renderList(start, end);
        }, 600);
    }

    // 5. Fungsi Modal & WA (Tanpa menampilkan pelat ke user, tapi dikirim ke WA Admin)
    function openBooking(brand, type, harga, referensiPlat) {
        const sDate = document.getElementById('start').value;
        const eDate = document.getElementById('end').value;
        const modelName = `${brand} ${type}`;
        
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="text-center mb-4">
                <h4 class="fw-bold text-dark">${modelName}</h4>
                <p class="text-muted small">Excellent Choice!</p>
            </div>
            <div class="bg-light p-3 rounded">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary"><b>Pick-up:</b></span> <span class="fw-bold">${sDate}</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary"><b>Return:</b></span> <span class="fw-bold">${eDate}</span>
                </div>
                <div class="d-flex justify-content-between border-top pt-3 mt-3">
                    <span class="text-secondary"><b>Daily Rate:</b></span> <span class="text-success fw-bold fs-5">IDR ${Number(harga).toLocaleString('id-ID')}</span>
                </div>
            </div>
        `;

        document.getElementById('confirmWaBtn').onclick = () => {
            // Teks WA yang dikirim akan menyisipkan referensi plat nomor untuk Om Budi
            const text = `Hello Budi.Balitour, I want to book:%0A%0A🛵 *Model:* ${modelName}%0A📅 *Dates:* ${sDate} to ${eDate}%0A💰 *Price:* IDR ${Number(harga).toLocaleString('id-ID')}/day%0A%0A(Admin Ref: Aval Unit - ${referensiPlat})%0A%0AIs this available to proceed?`;
            window.open(`https://wa.me/${adminNumber}?text=${text}`, '_blank');
        };

        const myModal = new bootstrap.Modal(document.getElementById('bookingModal'));
        myModal.show();
    }

    // Jalankan fetch data di awal
    fetchData();
</script>

</body>
</html>
