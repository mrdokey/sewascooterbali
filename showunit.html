<!DOCTYPE html>
<html lang="id">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18092766626"></script> 
    <script> 
      window.dataLayer = window.dataLayer || []; 
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date()); 
      gtag('config', 'AW-18092766626'); 
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3721/3721619.png">
    
    <title>Katalog Armada - Budi Bali Tour</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #f39c12; --dark-bg: #1a1d20; }
        body { background-color: #fcfcfc; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Multi-Language Toggle */
        body.lang-id .en { display: none !important; }
        body.lang-en .id { display: none !important; }

        /* Floating Button */
        .floating-booking {
            position: fixed; bottom: 30px; right: 30px; background-color: var(--primary-color);
            color: #fff; padding: 16px 28px; border-radius: 50px; box-shadow: 0 10px 25px rgba(243, 156, 18, 0.5);
            font-weight: 800; z-index: 9999; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .floating-booking:hover { transform: translateY(-5px); background-color: #d68910; color: #fff; }

        /* Navbar */
        .navbar { background: rgba(255, 255, 255, 0.95); padding: 12px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .navbar-brand { font-weight: 800; color: var(--primary-color) !important; }
        .lang-btn { background: #fff; border: 1px solid #ccc; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        /* Hero Mini */
        .hero-mini {
            padding: 100px 0 60px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center; color: white; text-align: center; clip-path: ellipse(150% 100% at 50% 0%);
        }

        /* Cards Grouping */
        .card-motor { border: none; border-radius: 24px; background: #fff; transition: 0.4s; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .img-wrapper { position: relative; height: 200px; overflow: hidden; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .status-pill { position: absolute; top: 15px; left: 15px; padding: 6px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; color: #fff; text-transform: uppercase; z-index: 10; }
        
        .bg-available { background-color: #0d6efd; } /* Biru untuk Ready */
        .bg-rented { background-color: #6c757d; }    /* Abu untuk In Rent */

        footer { background: var(--dark-bg); color: #adb5bd; padding: 40px 0; margin-top: 60px; text-align: center; }
    </style>
</head>
<body class="lang-id">

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">Budi Bali Tour</a>
        <div class="ms-auto d-flex align-items-center">
            <button class="lang-btn me-3" onclick="toggleLang()">
                <i class="fas fa-globe"></i> ID | EN
            </button>
            <a class="nav-link" href="index.html" style="font-weight: 600; color:#333;"><i class="fas fa-home"></i></a>
        </div>
    </div>
</nav>

<header class="hero-mini">
    <div class="container">
        <h1 class="fw-800 id">Katalog Armada</h1>
        <h1 class="fw-800 en">Fleet Collection</h1>
        <p class="id">Tipe motor terbaik yang siap menemani petualangan Anda.</p>
        <p class="en">The best motorbikes ready for your adventure.</p>
    </div>
</header>

<div class="container my-5" id="catalog">
    <div id="loading" class="text-center py-5">
        <div class="spinner-grow text-warning"></div>
        <p class="mt-3 fw-bold text-muted id">Menyiapkan Informasi...</p>
        <p class="mt-3 fw-bold text-muted en">Categorizing fleet...</p>
    </div>
    <div class="row g-4" id="catalogContainer"></div>
</div>

<footer>
    <div class="container">
        <p>© 2026 <b>Budi Bali Tour</b>. Powered by MRD Digital Solution.</p>
    </div>
</footer>

<a href="cariunit.html" class="floating-booking">
    <i class="fas fa-calendar-check"></i> 
    <span class="id">Cek Ketersediaan</span>
    <span class="en">Check Availability</span>
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx7sajGJff6Ay1-ZNysQ86lHyA7IhlOpdBFXrW5RL81J8Fm5xl4-JtLej5fo-eWqHjpCQ/exec";
    const adminWA = "6281238033247";

    function toggleLang() {
        document.body.classList.toggle('lang-en');
        document.body.classList.toggle('lang-id');
    }

    function getAutoImage(type) {
        const t = type.toLowerCase();
        if (t.includes("nmax")) return "https://i.ibb.co.com/1JzVD8KB/NMAX-NEO-S-BLACK.png";
        if (t.includes("vespa")) return "https://i.ibb.co.com/WpjDP07V/harga-vespa-matic-2023-1.webp";
        if (t.includes("scoopy")) return "https://www.wahanahonda.com/assets/upload/produk/gambar/PRODUK_GAMBAR_48_2025-11-13.webp";
        if (t.includes("vario")) return "https://i.ibb.co.com/9kbm6Pwh/images-15.jpg";
        if (t.includes("beat")) return "https://i.ibb.co.com/BHDpWZXS/honda-beat-deluxe-smart-key-deluxe-matte-blue-01-warna.webp";
        if (t.includes("fazzio")) return "https://i.ibb.co.com/nqgDF9kV/images-11.jpg";
        if (t.includes("stylo")) return "https://i.ibb.co.com/ycFPFg1k/008881800-1706860240-20240202-144627.jpg";
        if (t.includes("filano")) return "https://cdn.antaranews.com/cache/1200x800/2024/11/07/1000446916.jpg";
        if (t.includes("avanza manual")) return "https://i.ibb.co.com/dCwwwJ6/3205132941.jpg";
        if (t.includes("xenia")) return "https://dsoodysseusstprod.blob.core.windows.net/strapi-media/assets/sys_master_media_h6d_h39_8819370557470_Xenia_20terbaru_132bc6a428.jpg";
        return "https://i.ibb.co.com/WpjDP07V/harga-vespa-matic-2023-1.webp";
    }

    async function loadCatalog() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            renderCatalog(data.items);
            document.getElementById('loading').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function renderCatalog(items) {
        const container = document.getElementById('catalogContainer');
        container.innerHTML = "";
        let groups = {};

        items.forEach(m => {
            const type = m[1];
            const brand = m[2];
            const price = m[3];
            const status = (m[5] || "Available").toLowerCase();

            if (!groups[type]) {
                groups[type] = { brand: brand, type: type, price: price, ready: 0, image: getAutoImage(type) };
            }
            if (status === "available" || status === "booked") groups[type].ready++;
        });

        for (const key in groups) {
            const g = groups[key];
            const isReady = g.ready > 0;
            
            const statusTextID = isReady ? "READY HARI INI" : "IN RENT";
            const statusTextEN = isReady ? "READY TODAY" : "IN RENT";
            const statusClass = isReady ? "bg-available" : "bg-rented";

            container.innerHTML += `
                <div class="col-lg-4 col-md-6">
                    <div class="card card-motor h-100">
                        <div class="img-wrapper">
                            <span class="status-pill ${statusClass}">
                                <span class="id">${statusTextID}</span>
                                <span class="en">${statusTextEN}</span>
                            </span>
                            <img src="${g.image}" alt="${g.type}">
                        </div>
                        <div class="card-body p-4 text-center">
                            <small class="fw-bold text-warning text-uppercase">${g.brand}</small>
                            <h4 class="fw-bold text-dark mb-1">${g.type}</h4>
                            <p class="text-success fw-bold mb-3">Rp ${Number(g.price).toLocaleString('id-ID')} <small class="text-muted">/day</small></p>
                            
                            <div class="d-grid gap-2">
                                <a href="https://wa.me/${adminWA}?text=Halo Budi Bali Tour, apakah unit ${g.brand} ${g.type} masih ada yang ready?" 
                                   target="_blank" 
                                   onclick="if(typeof gtag === 'function') { gtag('event', 'conversion', {'send_to': 'AW-18092766626/ZDZwCI_MxZwcEKLrprND'}); }" 
                                   class="btn ${isReady ? 'btn-primary' : 'btn-outline-secondary'} py-2 fw-bold rounded-pill">
                                   <span class="id">${isReady ? 'Booking Sekarang' : 'Tanya Jadwal'}</span>
                                   <span class="en">${isReady ? 'Book Now' : 'Check Schedule'}</span>
                                </a>
                            </div>
                            ${isReady ? `<small class="text-primary mt-2 d-block fw-bold">${g.ready} unit standby</small>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
    }
    loadCatalog();
</script>
</body>
</html>
